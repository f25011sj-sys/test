<html>
  <head>
    <meta name="robots" content="noindex" />
  </head>
  <body>
    ログインしてな～
    <div id="status">未ログイン</div>
    <button id="login">Googleログイン</button>
    <div id="honpen"></div>
    <script type="module">
      // Import the functions you need from the SDKs you need
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
      import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-analytics.js";
      import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";
      import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
      import { signOut } from "firebase/auth";
      // TODO: Add SDKs for Firebase products that you want to use
      // https://firebase.google.com/docs/web/setup#available-libraries
    
      // Your web app's Firebase configuration
      // For Firebase JS SDK v7.20.0 and later, measurementId is optional
      const firebaseConfig = {
        apiKey: "AIzaSyCKSG6_SnBdG7I3OJgd_kfHoCnoqtrY7wo",
        authDomain: "w-3995e.firebaseapp.com",
        projectId: "w-3995e",
        storageBucket: "w-3995e.firebasestorage.app",
        messagingSenderId: "603513071250",
        appId: "1:603513071250:web:133e8b49f5a91d96b0284b",
        measurementId: "G-8Q8YQFMS3E"
      };
    
      // Initialize Firebase
      const app = initializeApp(firebaseConfig);
      const analytics = getAnalytics(app);
      const auth = getAuth(app);
      const db = getDatabase(app);
      const provider = new GoogleAuthProvider();
      document.getElementById("login").onclick = () => {
        signInWithPopup(auth, provider);
      };
      onAuthStateChanged(auth, (user) => {
        if (user) {
          if (!user.email.endsWith("com")) {
            alert("このアカウントは使えません");
            await signOut(auth);
            return;
          }
          document.getElementById("status").innerText =
            "ログイン中: " + user.email;
          const dbRef = ref(db);
          get(child(dbRef, "value")).then((snapshot) => {
            console.log("exists:", snapshot.exists());
  console.log("val:", snapshot.val());
            if (snapshot.exists()) {
              document.getElementById("honpen").innerHTML =
                snapshot.val();
            }
          });
        } else {
          document.getElementById("status").innerText =
            "未ログイン";
        }
      });
    </script>
  </body>
</html>
