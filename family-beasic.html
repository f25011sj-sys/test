<html>
<head>
<title>スクラッチ</title>
<style>
body,textarea{
background-color:#000;
color:#fff;
width: 1000px;
}
  <meta name="robots" content="noindex" />
</style>
</head>
<body>
<div>コード説明</br>move:前に進む</br>turn:回る</br>fps:１フレーム進める</br>create:キャラクターを置く</br>key:キーが押されたら</br>loop:ここから下のコードはループする</br>stop:何秒まつ</br>size:サイズを変える</div>
<textarea id="moji" rows="40" cols="80"></textarea>
<button onclick="start()">🏴</button><button onclick="dow()">コードを保存</button><input id="file_name" value="スクラッチのプロジェクト"><input type="file" id="rf"></br>
<canvas id="canvas" width="480" height="360" style="background-color:#fff;"></canvas>
<script>
const moji=document.getElementById('moji');
let code=moji.value;
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
let img=[];
let img_x=[];
let img_y=[];
let img_turn=[];

const push_key={};
document.addEventListener("keydown", (e) => {
  push_key[e.key] = true;
});
document.addEventListener("keyup", (e) => {
  push_key[e.key] = false;
});
function key(keycode){
  return !!push_key[keycode];
}

function wait(ms){
    return new Promise(resolve => setTimeout(resolve, ms));
}
function reset(){
    ctx.fillStyle = "#fff";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
}
async function start(){
    reset();
    img=[];
    img_x=[];
    img_y=[];
    img_turn=[];
    code=moji.value;
    await conp(code.split("loop")[0]);
    while(1)
    await conp(code.split("loop")[1]);
    //conp(code,2);
    //conp(code,3);
    //conp(code,4);
}
async function conp(code){
    const aaa=code.split("\n");
    for(let i=0;i<aaa.length;i++){
        let aa=aaa[i].trim();
        if(aa.startsWith("move")){
            const w=aa.split(" ");
            img_x[Number(w[1])]+=Number(w[2]);
            img_y[Number(w[1])]+=Number(w[2]);
        }else if(aa.startsWith("turn")){
            const w=aa.split(" ");
            img_turn[Number(w[1])]+=Number(w[2]);
        }else if(aa.startsWith("create")){
            let n=new Image();
            n.src = aa.split(" ")[1];
            await new Promise(resolve => {
                n.onload = () => {
                    img.push(n);
                    img_x.push(240);
                    img_y.push(180);
                    img_turn.push(0);
                    resolve();
                };
            });
        }else if(aa.startsWith("fps")){
            await wait(17);
        }else if(aa.startsWith("key")){
            const w=aa.split(" ");
            if(key(w[1]))
            await conp(w.slice(2).join(" "));
        }else if(aa.startsWith("stop")){
            await wait(aa.split(" ")[1]*1000);
        }
        reset();
        for(let ii=0;ii<img.length;ii++){
            ctx.save();
            ctx.translate(img_x[ii], img_y[ii]);
            ctx.rotate(img_turn[ii] * Math.PI / 180);
            ctx.drawImage(img[ii], -img[ii].width/2, -img[ii].height/2);
            ctx.restore();
        }
    }
}
function dow(){
    const aaaa = document.getElementById("file_name");
    download(aaaa.value,code);
}
function download(filename, text) {
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([text], { type: "text/plain" }));
    a.download = filename+".project";
    a.click();
}
document.getElementById("rf").addEventListener("change", function(e){
    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = function(){
        moji.value=reader.result;
        file_name.value=file.name.split(".")[0];
    };

    reader.readAsText(file);
});
</script>
</body>
</html>
